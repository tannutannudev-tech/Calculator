<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="calculator_css.css">

    <title>Calculator</title>
    </head>
    <body>
    <div class = "calculator">
    <div class="placeholder">
        <input type="text" id = "display" value ="0">
    </div>
    <div>
        <button class="btn-util" onclick = "pressKey('AC')">AC</button>
        <button class="btn-util" onclick = "pressKey('DEL')">DEL</button>
        <button onclick = "pressKey('%')">%</button>
        <button class="btn-op"  onclick = "pressKey('/')">/</button>
    </div>
    <div>
        <button class="btn-num" onclick = "pressKey('7')">7</button>
        <button onclick = "pressKey('8')">8</button>
        <button onclick = "pressKey('9')">9</button>
        <button class="btn-op"  onclick = "pressKey('*')">*</button>
    </div>
    <div>
        <button onclick = "pressKey('4')">4</button>
        <button onclick = "pressKey('5')">5</button>
        <button onclick = "pressKey('6')">6</button>
        <button class="btn-op"  onclick = "pressKey('-')">-</button>
    </div>
    <div>
    <button onclick = "pressKey('1')">1</button>
    <button onclick = "pressKey('2')">2</button>
    <button onclick = "pressKey('3')">3</button>
    <button class="btn-op" onclick = "pressKey('+')">+</button>
    </div>
    <div>
        <button onclick = "pressKey('00')">00</button>
        <button onclick = "pressKey('0')">0</button>
        <button onclick = "pressKey('.')">.</button>
        <button class="btn-eq" onclick = "pressKey('=')">=</button>
    </div>
</div>
<script src = "calculator_js.js"></script>
</body>

</html>
